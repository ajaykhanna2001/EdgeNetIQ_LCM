name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-node:
    name: Test Node.js Apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edgenetiq_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Type check
      run: pnpm typecheck

    - name: Lint
      run: pnpm lint

    - name: Generate Prisma client
      run: pnpm exec prisma generate --workspace=svc-calendar

    - name: Run database migrations
      run: pnpm exec prisma migrate deploy --workspace=svc-calendar
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edgenetiq_test

    - name: Run tests
      run: pnpm test --filter svc-calendar
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edgenetiq_test

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build calendar service image
      uses: docker/build-push-action@v5
      with:
        context: ./apps/svc-calendar
        push: false
        tags: edgenetiq/calendar-service:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build web app image
      uses: docker/build-push-action@v5
      with:
        context: ./apps/web
        push: false
        tags: edgenetiq/web:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-agent:
    name: Build Go Agent
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.21]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Go ${{ matrix.go-version }}
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}

    - name: Build agent
      run: |
        cd apps/agent-edge
        go mod download
        go build -v -o agent ./cmd/agent

    - name: Test agent
      run: |
        cd apps/agent-edge
        go test -v ./...

  helm-lint:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'

    - name: Lint Helm charts (when available)
      run: |
        if [ -d "infra/helm" ]; then
          find infra/helm -name "Chart.yaml" -exec dirname {} \; | xargs -I {} helm lint {}
        else
          echo "No Helm charts found, skipping lint"
        fi

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build-docker]
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Start services
      run: |
        docker-compose -f docker-compose.dev.yml up -d postgres redpanda redis
        sleep 30

    - name: Run migrations and seed
      run: |
        pnpm exec prisma migrate deploy --workspace=svc-calendar
        pnpm seed
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edgenetiq

    - name: Start calendar service
      run: |
        cd apps/svc-calendar
        npm run build
        npm start &
        sleep 10
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edgenetiq
        PORT: 3001

    - name: Test API endpoints
      run: |
        # Test health
        curl -f http://localhost:3001/events || exit 1
        
        # Test ICS feed
        curl -f http://localhost:3001/events/feed.ics | grep "BEGIN:VCALENDAR" || exit 1
        
        # Test event creation
        curl -f -X POST http://localhost:3001/events \
          -H "Content-Type: application/json" \
          -d '{
            "title": "Test Event",
            "eventType": "maintenance",
            "startDate": "2024-04-01T10:00:00Z",
            "endDate": "2024-04-01T12:00:00Z",
            "isAllDay": false,
            "organizer": "test@example.com",
            "attendees": [],
            "shipIds": [],
            "assetIds": [],
            "priority": "medium",
            "status": "scheduled"
          }' || exit 1

    - name: Cleanup
      if: always()
      run: docker-compose -f docker-compose.dev.yml down -v

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'